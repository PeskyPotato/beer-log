{% extends "base.html" %}
{% block title %}Brewery - {{ brewery.name }}{% endblock %}
{% block content %}
<main>
    <h1>{{ brewery.name }}</h1>
    <div class="segment">
        <h2 class="segment-title">Beers</h2>
        <ul>
            {% for beer in beers %}
            <li>
                <a href="{{ prefix }}/{{ brewery.slug }}/{{ beer.slug }}/">{{ beer.name }}</a>
            </li>
            {% endfor %}
        </ul>
    </div>
</main>
{% endblock %}
